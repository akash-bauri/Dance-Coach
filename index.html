<!DOCTYPE html>
<html>
<head>
  <title>AI Dance Coach Pro</title>
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>

<body>

<div id="app">

  <h1>AI Dance Coach 🔥</h1>

  <div class="videos">

    <!-- TEACHER -->
    <div>
      <h3>Teacher Video</h3>
      <video id="teacherVideo" controls></video>
      <input type="file" id="teacherUpload" accept="video/*">
    </div>

    <!-- USER -->
    <div>
      <h3>Your Video</h3>
      <video id="userVideo" autoplay playsinline></video>
      <input type="file" id="userUpload" accept="video/*">
    </div>

  </div>

  <div class="controls">
    <button onclick="startComparison()">Start Comparison</button>
  </div>

  <h2>Accuracy: <span id="accuracy">0</span>%</h2>
  <h3 id="result">Result: -</h3>

  <button onclick="downloadReport()">Download Report</button>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
