<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dance Coach | AI Powered</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        #canvas-overlay { position: absolute; top: 0; left: 0; pointer-events: none; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans">

    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-[url('https://images.unsplash.com/photo-1508700115892-45ecd05ae2ad?auto=format&fit=crop&q=80')] bg-cover">
        <div class="glass p-10 rounded-2xl text-center shadow-2xl">
            <h1 class="text-4xl font-bold mb-4">Dance Coach 🔥</h1>
            <p class="mb-6 text-slate-300">Level up your moves with Real-Time AI</p>
            <button id="login-btn" class="bg-gradient-to-r from-purple-600 to-pink-600 px-8 py-3 rounded-full font-bold hover:scale-105 transition">Login with Google</button>
        </div>
    </div>

    <div id="app-screen" class="hidden h-screen flex flex-col p-4">
        <header class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold">Dance Coach</h2>
            <div class="flex gap-4">
                <button id="download-btn" class="bg-green-600 px-4 py-2 rounded-lg text-sm">Download Result</button>
                <div id="user-info" class="text-sm border-l pl-4"></div>
            </div>
        </header>

        <main class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="relative bg-black rounded-xl overflow-hidden border-2 border-purple-500">
                <video id="teacher-video" class="w-full h-full object-cover" src="assets/teacher.mp4" loop muted controls></video>
                <div class="absolute top-2 left-2 bg-purple-600 px-2 py-1 rounded text-xs uppercase">Teacher</div>
            </div>

            <div class="relative bg-black rounded-xl overflow-hidden border-2 border-blue-500">
                <video id="user-video" class="w-full h-full object-cover shadow-inner"></video>
                <canvas id="canvas-overlay"></canvas>
                <div class="absolute top-2 left-2 bg-blue-600 px-2 py-1 rounded text-xs uppercase">You</div>
                
                <div class="absolute bottom-4 right-4 glass p-4 rounded-xl w-48">
                    <p class="text-xs text-slate-400">Accuracy</p>
                    <div class="text-3xl font-mono font-bold text-green-400" id="accuracy-score">0%</div>
                    <div class="w-full bg-slate-700 h-2 rounded-full mt-2">
                        <div id="score-bar" class="bg-green-400 h-2 rounded-full transition-all" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="src/auth.js"></script>
    <script type="module" src="src/detector.js"></script>
</body>
</html>
