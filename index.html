<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Dance Coach</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
</head>

<body>

  <!-- LOGIN -->
  <div id="loginPage" class="container">
    <h1>AI Dance Coach 🔥</h1>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button id="emailLogin">Login</button>
    <button id="googleLogin">Google Login</button>
  </div>

  <!-- APP -->
  <div id="appPage" class="container hidden">
    <h2>AI Dance Coach 🎯</h2>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <h3>Score: <span id="score">0</span></h3>

    <canvas id="chart"></canvas>

    <button onclick="startCamera()">Start AI</button>
    <button onclick="logout()">Logout</button>
  </div>

  <script type="module" src="app.js"></script>

</body>
</html>
