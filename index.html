<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dance Coach PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">

    <div id="login-screen" class="p-8 rounded-3xl bg-slate-900 border border-white/10 max-w-sm w-full shadow-2xl">
        <h1 class="text-3xl font-black mb-1 text-blue-400 text-center uppercase">AI Dance Coach</h1>
        <p class="text-slate-500 text-[10px] text-center mb-8 font-bold uppercase tracking-widest">Professional AI Feedback</p>
        
        <div class="space-y-4 mb-6">
            <input type="email" id="email-input" placeholder="Email Address" class="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 outline-none focus:border-blue-500 transition-all">
            <input type="password" id="pass-input" placeholder="Password" class="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 outline-none focus:border-blue-500 transition-all">
            <button id="email-btn" class="w-full bg-slate-700 hover:bg-slate-600 py-4 rounded-xl font-bold transition-all active:scale-95">LOGIN</button>
        </div>

        <div class="flex items-center my-6">
            <div class="flex-grow border-t border-slate-800"></div>
            <span class="px-4 text-slate-600 text-[10px] font-black uppercase">Or continue with</span>
            <div class="flex-grow border-t border-slate-800"></div>
        </div>

        <button id="google-btn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold transition-all shadow-lg shadow-blue-500/20 active:scale-95">
            SIGN IN WITH GOOGLE
        </button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
