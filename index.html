<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dance Coach PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">

    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-black/95">
        <div class="p-8 rounded-3xl bg-slate-900 border border-white/10 max-w-sm w-full text-center shadow-2xl">
            <h1 class="text-3xl font-black mb-2 text-blue-400 uppercase">AI Dance Coach</h1>
            <p class="text-slate-400 text-xs mb-8">Professional AI feedback for your journey.</p>
            
            <div class="space-y-3 mb-6">
                <input type="email" id="email-input" placeholder="Email" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 outline-none focus:border-blue-500">
                <input type="password" id="pass-input" placeholder="Password" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 outline-none focus:border-blue-500">
                <button id="email-btn" class="w-full bg-slate-700 hover:bg-slate-600 py-3 rounded-xl font-bold transition">LOGIN</button>
            </div>

            <div class="flex items-center gap-2 mb-6 text-[10px] font-bold text-slate-600 uppercase">
                <div class="h-px bg-slate-800 flex-1"></div> OR <div class="h-px bg-slate-800 flex-1"></div>
            </div>

            <button id="google-btn" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition shadow-lg shadow-blue-500/20">
                SIGN IN WITH GOOGLE
            </button>
        </div>
    </div>

    <div id="app-screen" class="hidden h-screen flex flex-col p-4">
        <header class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-black italic text-blue-400">DANCE COACH PRO</h2>
            <div id="user-tag" class="text-xs font-bold text-slate-400 bg-white/5 px-3 py-2 rounded-lg border border-white/10">GUEST</div>
        </header>

        <main class="flex-1 grid grid-cols-1 lg:grid-cols-2 gap-4 overflow-hidden">
            <div class="relative rounded-3xl overflow-hidden bg-black border border-white/5">
                <video id="teacher-vid" class="w-full h-full object-cover" loop muted controls></video>
                <input type="file" id="vid-upload" accept="video/*" class="absolute top-4 left-4 z-10 text-[10px] bg-black/50 p-1 rounded">
            </div>

            <div class="relative rounded-3xl overflow-hidden bg-black border border-white/5">
                <video id="user-vid" class="w-full h-full object-cover"></video>
                <canvas id="pose-canvas" class="absolute inset-0 w-full h-full"></canvas>
                <div class="absolute bottom-6 right-6 bg-slate-900/90 p-5 rounded-2xl border border-white/10 min-w-[120px]">
                    <p class="text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-widest">Accuracy</p>
                    <div id="accuracy-txt" class="text-4xl font-black text-emerald-400">0%</div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
